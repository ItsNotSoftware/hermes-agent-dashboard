<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, height=480">
<title>RPi Dashboard</title>
<style>
  :root {
    --bg: #0a0e17; --card: #111827; --border: #1e293b;
    --text: #e2e8f0; --dim: #64748b; --accent: #38bdf8;
    --green: #22c55e; --orange: #f59e0b; --red: #ef4444; --purple: #a78bfa; --cyan: #06b6d4;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono','Courier New',monospace; padding:6px; overflow:hidden; width:800px; height:480px; user-select:none; }

  /* ── Header ─────────────────────────────────────── */
  .header { display:flex; justify-content:space-between; align-items:center; padding:4px 10px; margin-bottom:6px; background:var(--card); border-radius:6px; border:1px solid var(--border); }
  .header h1 { font-size:15px; color:var(--accent); letter-spacing:2px; }
  .header .clock { font-size:14px; color:var(--dim); }
  .dot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:4px; }
  .dot.on { background:var(--green); box-shadow:0 0 5px var(--green); }
  .dot.off { background:var(--red); box-shadow:0 0 5px var(--red); }
  .status { font-size:12px; display:flex; align-items:center; }
  .model-tag { display:inline-block; padding:1px 7px; border-radius:4px; font-size:12px; background:rgba(56,189,248,0.1); color:var(--accent); border:1px solid rgba(56,189,248,0.25); }

  /* ── Card base ──────────────────────────────────── */
  .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 10px; display:flex; position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg, var(--accent), var(--purple), var(--cyan)); opacity:0.45; }
  .card-title { font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:6px; display:flex; align-items:center; gap:5px; flex-shrink:0; }

  /* ── Layout ─────────────────────────────────────── */
  .main-grid  { display:grid; grid-template-columns:1fr 1fr; grid-template-rows:148px 86px; gap:6px; margin-bottom:6px; }
  .cpu-card { grid-column:1; grid-row:1; }
  .resources-card { grid-column:1; grid-row:2; }
  .ai-card { grid-column:2; grid-row:1 / span 2; }
  .bottom-row { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:6px; height:198px; }

  /* ── CPU widget ──────────────────────────────────── */
  .cpu-main { display:flex; align-items:stretch; gap:14px; flex:1; height:100%; }
  .cpu-gauge { display:flex; flex-direction:column; align-items:center; justify-content:flex-start; flex-shrink:0; width:86px; padding-top:4px; }
  .cpu-gauge svg { display:block; }
  .cpu-gauge-pct { font-size:24px; font-weight:bold; line-height:1; margin-top:2px; }
  .cpu-gauge-label { font-size:10px; color:var(--dim); letter-spacing:2px; margin-top:2px; }
  .cpu-gauge-chips { display:flex; flex-direction:column; gap:4px; margin-top:6px; width:100%; }
  .cpu-chip { font-size:11px; padding:2px 6px; border-radius:3px; background:rgba(255,255,255,0.05); border:1px solid var(--border); white-space:nowrap; text-align:center; }
  .cpu-cores { flex:1; display:flex; flex-direction:column; justify-content:space-between; min-width:0; padding:4px 0 2px; }
  .core-row { display:flex; align-items:center; gap:7px; }
  .core-lbl { font-size:12px; color:var(--dim); width:18px; text-align:right; flex-shrink:0; }
  .core-track { flex:1; height:9px; background:rgba(255,255,255,0.05); border-radius:4px; overflow:hidden; position:relative; }
  .core-fill { height:100%; border-radius:4px; transition:width 0.6s ease; position:relative; }
  .core-fill::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,0.15) 0%,transparent 100%); border-radius:4px; }
  .core-pct { font-size:12px; font-weight:bold; width:34px; text-align:right; flex-shrink:0; }

  /* ── Resources widget ───────────────────────────── */
  .res-body { flex:1; display:flex; flex-direction:column; justify-content:space-around; gap:6px; }
  .res-section { display:flex; flex-direction:column; gap:2px; }
  .res-row { display:flex; align-items:center; gap:6px; }
  .res-lbl-left { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:1px; width:30px; flex-shrink:0; }
  .res-track { flex:1; height:10px; background:rgba(255,255,255,0.06); border-radius:4px; overflow:hidden; position:relative; }
  .res-fill { height:100%; border-radius:4px; transition:width 0.8s ease; position:relative; }
  .res-fill::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,0.18) 0%,transparent 100%); border-radius:4px; }
  .res-pct { font-size:13px; font-weight:bold; width:36px; text-align:right; flex-shrink:0; }
  .res-detail { font-size:9px; color:var(--dim); width:80px; text-align:right; flex-shrink:0; white-space:nowrap; }
  .res-sub { display:flex; gap:10px; font-size:9px; color:var(--dim); padding-left:36px; }
  .res-sub b { color:var(--text); font-weight:normal; }

  /* ── AI usage widget ─────────────────────────────── */
  .ai-usage { display:flex; flex:1; flex-direction:column; min-width:0; gap:8px; }
  .usage-stack { display:grid; grid-template-rows:1fr 1fr; gap:8px; flex:1; min-width:0; }
  .usage-provider { position:relative; display:flex; flex-direction:column; gap:7px; min-width:0; padding:8px; border-radius:8px; border:1px solid var(--border); background:
      linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
      rgba(255,255,255,0.015); }
  .usage-provider::before { content:''; position:absolute; inset:0 0 auto 0; height:2px; border-radius:8px 8px 0 0; opacity:0.7; }
  .usage-provider.openai::before { background:linear-gradient(90deg, var(--cyan), var(--accent)); }
  .usage-provider.claude::before { background:linear-gradient(90deg, var(--purple), var(--accent)); }
  .usage-header { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .usage-title { min-width:0; display:flex; flex-direction:column; gap:3px; }
  .usage-name { font-size:13px; font-weight:bold; color:var(--text); text-transform:uppercase; letter-spacing:1.4px; text-shadow:0 0 10px rgba(255,255,255,0.08); }
  .usage-provider.openai .usage-name { color:var(--accent); }
  .usage-provider.claude .usage-name { color:var(--purple); }
  .usage-line { display:flex; align-items:center; gap:8px; min-width:0; }
  .usage-hero { font-size:18px; font-weight:bold; line-height:1; letter-spacing:0.3px; }
  .provider-pill { padding:3px 7px; border-radius:999px; font-size:9px; text-transform:uppercase; letter-spacing:1px; border:1px solid var(--border); background:rgba(255,255,255,0.04); white-space:nowrap; }
  .provider-pill.ok { color:var(--green); border-color:rgba(34,197,94,0.24); background:rgba(34,197,94,0.10); }
  .provider-pill.warn { color:var(--orange); border-color:rgba(245,158,11,0.24); background:rgba(245,158,11,0.10); }
  .provider-pill.hit { color:var(--red); border-color:rgba(239,68,68,0.24); background:rgba(239,68,68,0.10); }
  .usage-sub { font-size:9px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .usage-window-list { display:flex; flex-direction:column; gap:6px; flex:1; justify-content:center; }
  .usage-window-row { display:grid; grid-template-columns:24px 1fr 42px 68px; gap:6px; align-items:center; }
  .usage-window-tag { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:1px; }
  .usage-window-track { height:14px; background:rgba(255,255,255,0.05); border-radius:999px; overflow:hidden; position:relative; }
  .usage-window-fill { height:100%; border-radius:999px; transition:width 0.8s ease; position:relative; }
  .usage-window-fill::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg, rgba(255,255,255,0.22), transparent 70%); }
  .usage-window-value { font-size:13px; font-weight:bold; text-align:right; white-space:nowrap; letter-spacing:-0.2px; }
  .usage-window-meta { font-size:9px; color:var(--dim); text-align:left; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:-0.2px; }
  .usage-footer { display:flex; justify-content:space-between; gap:10px; padding-top:2px; border-top:1px solid rgba(255,255,255,0.05); font-size:9px; color:var(--dim); }
  .usage-footer span { min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* ── Cron widget ─────────────────────────────────── */
  .cron-list { flex:1; display:flex; flex-direction:column; gap:0; overflow:hidden; }
  .cron-item { display:flex; gap:8px; align-items:stretch; padding:5px 0; border-bottom:1px solid var(--border); }
  .cron-item:last-child { border-bottom:none; }
  .cron-strip { width:3px; border-radius:2px; flex-shrink:0; }
  .cron-strip.active { background:var(--green); }
  .cron-strip.paused { background:var(--red); opacity:0.5; }
  .cron-body { flex:1; min-width:0; }
  .cron-name { font-size:13px; font-weight:bold; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:5px; }
  .cron-badge { font-size:10px; padding:1px 5px; border-radius:3px; font-weight:normal; flex-shrink:0; }
  .cron-badge.active { background:rgba(34,197,94,0.12); color:var(--green); }
  .cron-badge.paused { background:rgba(239,68,68,0.12); color:var(--red); }
  .cron-owner { font-size:9px; padding:1px 4px; border-radius:3px; font-weight:normal; flex-shrink:0; color:var(--accent); background:rgba(56,189,248,0.10); border:1px solid rgba(56,189,248,0.18); }
  .cron-meta { font-size:12px; color:var(--dim); margin-top:1px; }
  .cron-status { font-size:12px; flex-shrink:0; }

  /* ── Agent Ops / Attention widget ───────────────── */
  .ops-panel { flex:1; min-height:0; display:grid; grid-template-rows:58px 1fr; gap:7px; overflow:hidden; }
  .agent-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; min-height:0; }
  .agent-box { min-width:0; border:1px solid rgba(30,41,59,0.9); border-radius:6px; padding:5px 6px; background:rgba(255,255,255,0.025); display:flex; flex-direction:column; gap:4px; overflow:hidden; }
  .agent-top { display:flex; align-items:center; justify-content:space-between; gap:6px; }
  .agent-name { font-size:12px; font-weight:bold; color:var(--text); letter-spacing:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .agent-pill { font-size:9px; text-transform:uppercase; letter-spacing:1px; padding:1px 5px; border-radius:999px; border:1px solid var(--border); flex-shrink:0; }
  .agent-pill.ok { color:var(--green); background:rgba(34,197,94,0.10); border-color:rgba(34,197,94,0.25); }
  .agent-pill.paused, .agent-pill.idle { color:var(--orange); background:rgba(245,158,11,0.10); border-color:rgba(245,158,11,0.25); }
  .agent-pill.failed { color:var(--red); background:rgba(239,68,68,0.10); border-color:rgba(239,68,68,0.25); }
  .agent-meta { display:flex; justify-content:space-between; gap:6px; font-size:10px; color:var(--dim); white-space:nowrap; }
  .agent-next { font-size:10px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .agent-next b { color:var(--text); font-weight:normal; }
  .warn-box { min-height:0; display:flex; flex-direction:column; overflow:hidden; border-top:1px solid rgba(255,255,255,0.06); padding-top:6px; }
  .warn-title { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:1.3px; margin-bottom:4px; display:flex; justify-content:space-between; }
  .warn-list { flex:1; min-height:0; display:flex; flex-direction:column; gap:3px; overflow:hidden; }
  .warn-item { display:grid; grid-template-columns:46px 1fr; gap:6px; align-items:center; min-height:18px; padding:2px 5px; border-radius:4px; background:rgba(255,255,255,0.025); border-left:3px solid var(--orange); }
  .warn-item.hit { border-left-color:var(--red); background:rgba(239,68,68,0.07); }
  .warn-item.warn { border-left-color:var(--orange); }
  .warn-label { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:0.8px; white-space:nowrap; }
  .warn-text { font-size:11px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .warn-empty { font-size:12px; color:var(--green); padding-top:14px; text-align:center; }


  @keyframes glow { 0%,100%{opacity:1} 50%{opacity:.5} }
  .pulse { animation:glow 2s ease-in-out infinite; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>⚡ RPi DASHBOARD</h1>
  <span class="model-tag" id="model-tag">--</span>
  <span class="clock" id="clock">--:--:--</span>
  <span class="status"><span class="dot on pulse" id="live-dot"></span><span id="status-text">LIVE</span></span>
  <button onclick="exitDashboard()" style="background:none;border:1px solid var(--border);color:var(--dim);border-radius:4px;cursor:pointer;padding:2px 8px;font-size:10px;font-family:inherit;margin-left:6px;">✕ Quit</button>
</div>

<!-- MAIN GRID: CPU + Resources + AI Usage -->
<div class="main-grid">

  <!-- CPU Card -->
  <div class="card cpu-card">
    <div class="cpu-main">
      <div class="cpu-gauge">
        <svg viewBox="0 0 86 48" width="86" height="48">
          <defs>
            <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <path d="M 8,44 A 35,35 0 0 1 78,44" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="9" stroke-linecap="round"/>
          <path d="M 8,44 A 35,35 0 0 1 78,44" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="14" stroke-linecap="round" stroke-dasharray="2 8.9"/>
          <path id="cpu-arc" d="M 8,44 A 35,35 0 0 1 78,44" fill="none" stroke="var(--green)" stroke-width="9" stroke-linecap="round"
                stroke-dasharray="109.96" stroke-dashoffset="109.96" filter="url(#glow)"
                style="transition:stroke-dashoffset 0.6s ease,stroke 0.4s ease"/>
        </svg>
        <span class="cpu-gauge-pct" id="cpu-pct" style="color:var(--green)">--%</span>
        <span class="cpu-gauge-label">CPU</span>
        <div class="cpu-gauge-chips">
          <span class="cpu-chip" id="temp-val" style="color:var(--green)">🌡 --°</span>
          <span class="cpu-chip" id="freq-val" style="color:var(--cyan)">⚡ --</span>
        </div>
      </div>
      <div class="cpu-cores">
        <div class="core-row"><span class="core-lbl">C0</span><div class="core-track"><div class="core-fill" id="cf-0" style="width:0%;background:var(--green)"></div></div><span class="core-pct" id="cp-0" style="color:var(--green)">0%</span></div>
        <div class="core-row"><span class="core-lbl">C1</span><div class="core-track"><div class="core-fill" id="cf-1" style="width:0%;background:var(--green)"></div></div><span class="core-pct" id="cp-1" style="color:var(--green)">0%</span></div>
        <div class="core-row"><span class="core-lbl">C2</span><div class="core-track"><div class="core-fill" id="cf-2" style="width:0%;background:var(--green)"></div></div><span class="core-pct" id="cp-2" style="color:var(--green)">0%</span></div>
        <div class="core-row"><span class="core-lbl">C3</span><div class="core-track"><div class="core-fill" id="cf-3" style="width:0%;background:var(--green)"></div></div><span class="core-pct" id="cp-3" style="color:var(--green)">0%</span></div>
      </div>
    </div>
  </div>

  <!-- AI Usage Card -->
  <div class="card ai-card" id="plan-card" style="flex-direction:column;">
    <div class="ai-usage">
      <div class="usage-stack">
        <div class="usage-provider openai">
          <div class="usage-header">
            <div class="usage-title">
              <span class="usage-name">GPT</span>
            </div>
            <span class="provider-pill ok" id="plan-status-pill">--</span>
          </div>
          <div class="usage-window-list">
            <div class="usage-window-row">
              <span class="usage-window-tag">5h</span>
              <div class="usage-window-track">
                <div class="usage-window-fill" id="plan-primary-bar" style="width:0%;background:linear-gradient(90deg,var(--cyan),var(--accent))"></div>
              </div>
              <span class="usage-window-value" id="plan-primary-used" style="color:var(--cyan)">--%</span>
              <span class="usage-window-meta" id="plan-primary-reset">--</span>
            </div>
            <div class="usage-window-row">
              <span class="usage-window-tag">1w</span>
              <div class="usage-window-track">
                <div class="usage-window-fill" id="plan-secondary-bar" style="width:0%;background:linear-gradient(90deg,var(--accent),var(--purple))"></div>
              </div>
              <span class="usage-window-value" id="plan-secondary-used" style="color:var(--accent)">--%</span>
              <span class="usage-window-meta" id="plan-secondary-reset">--</span>
            </div>
          </div>
          <div class="usage-footer">
            <span id="plan-primary-window">5h window --</span>
            <span id="plan-secondary-window">1w window --</span>
          </div>
        </div>
        <div class="usage-provider claude">
          <div class="usage-header">
            <div class="usage-title">
              <span class="usage-name">Claude</span>
            </div>
            <span class="provider-pill ok" id="claude-status-pill">--</span>
          </div>
          <div class="usage-window-list">
            <div class="usage-window-row">
              <span class="usage-window-tag">5h</span>
              <div class="usage-window-track">
                <div class="usage-window-fill" id="claude-primary-bar" style="width:0%;background:linear-gradient(90deg,var(--purple),var(--accent))"></div>
              </div>
              <span class="usage-window-value" id="claude-primary-used" style="color:var(--purple)">--</span>
              <span class="usage-window-meta" id="claude-primary-reset">--</span>
            </div>
            <div class="usage-window-row">
              <span class="usage-window-tag">1w</span>
              <div class="usage-window-track">
                <div class="usage-window-fill" id="claude-secondary-bar" style="width:0%;background:linear-gradient(90deg,var(--accent),var(--cyan))"></div>
              </div>
              <span class="usage-window-value" id="claude-secondary-used" style="color:var(--accent)">--</span>
              <span class="usage-window-meta" id="claude-secondary-reset">--</span>
            </div>
          </div>
          <div class="usage-footer">
            <span id="claude-cost">Session --</span>
            <span id="claude-project">Project --</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Resources Card -->
  <div class="card resources-card">
    <div class="res-body">
      <div class="res-section">
        <div class="res-row">
          <span class="res-lbl-left">RAM</span>
          <div class="res-track"><div class="res-fill" id="ram-bar" style="width:0%;background:var(--green)"></div></div>
          <span class="res-pct" id="ram-val" style="color:var(--green)">--%</span>
          <span class="res-detail" id="ram-detail">-- / --</span>
        </div>
        <div class="res-sub">
          <span>Free <b id="ram-free">--</b></span>
          <span>Swap <b id="swap-used-val">--</b></span>
          <span>Up <b id="uptime-val">--</b></span>
        </div>
      </div>
      <div class="res-section">
        <div class="res-row">
          <span class="res-lbl-left">DISK</span>
          <div class="res-track"><div class="res-fill" id="disk-bar" style="width:0%;background:var(--green)"></div></div>
          <span class="res-pct" id="disk-val" style="color:var(--green)">--%</span>
          <span class="res-detail" id="disk-detail">-- / --</span>
        </div>
        <div class="res-sub">
          <span>Free <b id="disk-free">--</b></span>
          <span>↓ <b id="net-rx-inline">--</b></span>
          <span>↑ <b id="net-tx-inline">--</b></span>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- BOTTOM ROW -->
<div class="bottom-row">

  <!-- Cron Jobs -->
  <div class="card" style="flex-direction:column;">
    <div class="card-title">⏱ CRON JOBS</div>
    <div class="cron-list" id="cron-jobs"></div>
  </div>

  <!-- Agent Ops / Attention -->
  <div class="card" style="flex-direction:column;">
    <div class="card-title">⚙️ AGENT OPS</div>
    <div class="ops-panel">
      <div class="agent-grid" id="agent-ops"></div>
      <div class="warn-box">
        <div class="warn-title"><span>Attention</span><span id="warn-count">0</span></div>
        <div class="warn-list" id="warnings"></div>
      </div>
    </div>
  </div>

</div>

<script>
var CPU_CIRC = Math.PI * 35;
var lastStatusData = null;
var lastStatusOkAt = 0;

function color(p) { return p<50?'var(--green)':p<80?'var(--orange)':'var(--red)'; }
function tempColor(t) { return t<60?'var(--green)':t<75?'var(--orange)':'var(--red)'; }
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(ch) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
  });
}
function formatSpeed(b) {
  if(b >= 1e9) return {v:(b/1e9).toFixed(1), u:'GB/s'};
  if(b >= 1e6) return {v:(b/1e6).toFixed(1), u:'MB/s'};
  if(b >= 1e3) return {v:(b/1e3).toFixed(0), u:'KB/s'};
  return {v:b.toFixed(0), u:'B/s'};
}
function formatTokenCount(n) {
  n = Number(n || 0);
  if(n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if(n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toFixed(0);
}
function formatTokenUsage(n) {
  return formatTokenCount(n) + ' tok';
}
function formatMoney(n) {
  return '$' + Number(n || 0).toFixed(2);
}
function shortPath(p) {
  if(!p) return '--';
  var parts = String(p).split('/').filter(Boolean);
  return parts.length ? parts.slice(-2).join('/') : p;
}
function formatUptime(s) {
  var d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60);
  return d>0?d+'d '+h+'h':h+'h '+m+'m';
}
function formatCountdown(s) {
  s = Math.max(0, Math.floor(s || 0));
  var d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60);
  if(d > 0) return d+'d '+h+'h';
  if(h > 0) return h+'h '+m+'m';
  return m+'m';
}
function formatWindowLabel(s) {
  s = Math.max(0, Math.floor(s || 0));
  var d=Math.floor(s/86400),h=Math.floor((s%86400)/3600);
  if(d > 0) return d+'d';
  return h+'h';
}
function stripSubscriptionWords(text, fallback) {
  var cleaned = String(text || '')
    .replace(/\b(?:pro|plus|subscription)\b/gi, '')
    .replace(/[\s•_-]+/g, ' ')
    .trim();
  return cleaned || fallback || '';
}
function formatEventCount(n) {
  n = Number(n || 0);
  return n + ' msg' + (n === 1 ? '' : 's');
}
function pad(n){return n<10?'0'+n:''+n;}
function formatModelLabel(info){
  if(!info) return '';
  var model = info.model || '';
  var provider = info.provider || '';
  if(provider && model) return provider+' • '+model;
  return model || provider || '';
}
function pct(used, total){
  return total ? (Number(used || 0) / Number(total || 0) * 100) : 0;
}
function warnClass(kind){
  return kind === 'hit' ? 'hit' : 'warn';
}
function agentStateClass(state){
  return ['ok', 'paused', 'failed', 'idle'].indexOf(state) >= 0 ? state : 'idle';
}
function usageAlert(provider, label, windowData, items){
  if(!windowData || windowData.used_percent == null) return;
  var used = Number(windowData.used_percent || 0);
  if(used >= 90) items.push({kind:'hit', label:provider, text:label+' usage '+used.toFixed(0)+'%'});
  else if(used >= 80) items.push({kind:'warn', label:provider, text:label+' usage '+used.toFixed(0)+'%'});
}
function collectWarnings(d, fetchError){
  var items = [];
  var now = Date.now();
  if(fetchError){
    items.push({kind:'hit', label:'UI', text:'Status fetch failed: '+fetchError});
  }
  if(lastStatusOkAt && now - lastStatusOkAt > 6000){
    items.push({kind:'warn', label:'UI', text:'Dashboard data stale '+Math.floor((now - lastStatusOkAt) / 1000)+'s'});
  }
  if(!d) return items;

  (d.crons || []).forEach(function(c){
    var name = c.owner || c.profile || 'cron';
    if(c.last_status && c.last_status !== 'ok'){
      items.push({kind:'hit', label:name, text:'Failed cron: '+(c.name || 'Unnamed')});
    }
    if((c.state || 'active') === 'paused'){
      items.push({kind:'warn', label:name, text:'Paused cron: '+(c.name || 'Unnamed')});
    }
  });

  var temp = Number(d.temp || 0);
  if(temp >= 80) items.push({kind:'hit', label:'TEMP', text:'CPU temperature '+temp.toFixed(1)+'°C'});
  else if(temp >= 75) items.push({kind:'warn', label:'TEMP', text:'CPU temperature '+temp.toFixed(1)+'°C'});

  var ramPct = pct(d.memory && d.memory.used, d.memory && d.memory.total);
  var diskPct = pct(d.disk && d.disk.used, d.disk && d.disk.total);
  if(ramPct >= 95) items.push({kind:'hit', label:'RAM', text:'RAM usage '+ramPct.toFixed(0)+'%'});
  else if(ramPct >= 85) items.push({kind:'warn', label:'RAM', text:'RAM usage '+ramPct.toFixed(0)+'%'});
  if(diskPct >= 95) items.push({kind:'hit', label:'DISK', text:'Disk usage '+diskPct.toFixed(0)+'%'});
  else if(diskPct >= 85) items.push({kind:'warn', label:'DISK', text:'Disk usage '+diskPct.toFixed(0)+'%'});

  var plan = d.openai_plan;
  if(plan){
    if(plan.limit_reached) items.push({kind:'hit', label:'GPT', text:'OpenAI usage limit hit'});
    else if(!plan.allowed) items.push({kind:'warn', label:'GPT', text:'OpenAI usage not allowed'});
    usageAlert('GPT', '5h', plan.primary_window, items);
    usageAlert('GPT', '1w', plan.secondary_window, items);
  }

  var claude = d.claude_usage;
  if(claude && claude.usage_source === 'api'){
    usageAlert('Claude', '5h', claude.five_hour_window, items);
    usageAlert('Claude', '1w', claude.one_week_window, items);
  }

  return items.slice(0, 5);
}
function renderWarnings(d, fetchError){
  var items = collectWarnings(d, fetchError);
  document.getElementById('warn-count').textContent = String(items.length);
  var wdiv = document.getElementById('warnings');
  if(!items.length){
    wdiv.innerHTML = '<div class="warn-empty">No attention items</div>';
    return;
  }
  wdiv.innerHTML = items.map(function(item){
    return '<div class="warn-item '+warnClass(item.kind)+'">'
      +'<span class="warn-label">'+esc(item.label)+'</span>'
      +'<span class="warn-text" title="'+esc(item.text)+'">'+esc(item.text)+'</span>'
      +'</div>';
  }).join('');
}
function renderAgentOps(d){
  var ops = d.agent_ops || {};
  var names = ['C-3PO', 'EVE'];
  var html = names.map(function(name){
    var a = ops[name] || {name:name, state:'idle', job_count:0, paused_count:0, failed_count:0};
    var state = a.state || 'idle';
    var next = a.next_job;
    var nextText = next ? ((next.next_run || 'N/A')+' '+(next.name || 'Unnamed')) : 'No active next job';
    var alertText = [];
    if(a.failed_count) alertText.push(a.failed_count+' failed');
    if(a.paused_count) alertText.push(a.paused_count+' paused');
    return '<div class="agent-box">'
      +'<div class="agent-top"><span class="agent-name">'+esc(a.name || name)+'</span>'
      +'<span class="agent-pill '+agentStateClass(state)+'">'+esc(state)+'</span></div>'
      +'<div class="agent-meta"><span>'+Number(a.job_count || 0)+' jobs</span><span>'+esc(alertText.join(' / ') || 'clear')+'</span></div>'
      +'<div class="agent-next" title="'+esc(nextText)+'"><b>Next</b> '+esc(nextText)+'</div>'
      +'</div>';
  }).join('');
  document.getElementById('agent-ops').innerHTML = html;
}

function updateClock(){
  var n=new Date();
  document.getElementById('clock').textContent=pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
}

async function fetchMetrics(){
  try{
    var r = await fetch('/api/status');
    if(!r.ok) throw new Error('HTTP '+r.status);
    var d = await r.json();
    lastStatusData = d;
    lastStatusOkAt = Date.now();

    // ── CPU arc ──────────────────────────────────────
    var cpuObj = d.cpu && typeof d.cpu === 'object' ? d.cpu : {total:d.cpu, cores:[]};
    var cpuPct = Math.min(cpuObj.total || 0, 100);
    var arc = document.getElementById('cpu-arc');
    arc.style.strokeDashoffset = CPU_CIRC * (1 - cpuPct/100);
    arc.style.stroke = color(cpuPct);
    var pctEl = document.getElementById('cpu-pct');
    pctEl.textContent = cpuPct.toFixed(0)+'%';
    pctEl.style.color = color(cpuPct);

    var t = d.temp || 0;
    document.getElementById('temp-val').textContent = '🌡 '+t.toFixed(1)+'°';
    document.getElementById('temp-val').style.color = tempColor(t);
    document.getElementById('freq-val').textContent = '⚡ '+d.cpuFreq;

    var cores = cpuObj.cores || [];
    cores.forEach(function(v, i){
      var fill = document.getElementById('cf-'+i);
      var pct  = document.getElementById('cp-'+i);
      if(fill){ fill.style.width = v+'%'; fill.style.background = color(v); }
      if(pct){ pct.textContent = v.toFixed(0)+'%'; pct.style.color = color(v); }
    });

    // ── Resources ────────────────────────────────────
    var mp = d.memory.used/d.memory.total*100;
    document.getElementById('ram-val').textContent = mp.toFixed(0)+'%';
    document.getElementById('ram-val').style.color = color(mp);
    document.getElementById('ram-detail').textContent = d.memory.used.toFixed(0)+' MB / '+d.memory.total.toFixed(0)+' MB';
    var rb=document.getElementById('ram-bar'); rb.style.width=mp+'%'; rb.style.background=color(mp);
    document.getElementById('ram-free').textContent = (d.memory.total-d.memory.used).toFixed(0)+' MB';
    var swapTxt = d.swap && d.swap.total>0 ? d.swap.used.toFixed(0)+' / '+d.swap.total.toFixed(0)+' MB' : 'none';
    document.getElementById('swap-used-val').textContent = swapTxt;

    var dp = d.disk.used/d.disk.total*100;
    document.getElementById('disk-val').textContent = dp.toFixed(0)+'%';
    document.getElementById('disk-val').style.color = color(dp);
    document.getElementById('disk-detail').textContent = d.disk.used.toFixed(1)+' GB / '+d.disk.total.toFixed(1)+' GB';
    var db=document.getElementById('disk-bar'); db.style.width=dp+'%'; db.style.background=color(dp);
    document.getElementById('disk-free').textContent = (d.disk.total-d.disk.used).toFixed(1)+' GB';
    // ── Network ──────────────────────────────────────
    var dl=formatSpeed(d.netRx||0), ul=formatSpeed(d.netTx||0);
    document.getElementById('uptime-val').textContent = formatUptime(d.uptime||0);
    document.getElementById('net-rx-inline').textContent = dl.v + ' ' + dl.u;
    document.getElementById('net-tx-inline').textContent = ul.v + ' ' + ul.u;

    // ── OpenAI Plan ──────────────────────────────────
    if(d.openai_plan){
      var plan = d.openai_plan;
      var p5 = plan.primary_window || {};
      var pw = plan.secondary_window || {};
      var used5h = Math.min(p5.used_percent || 0, 100);
      var usedWeek = Math.min(pw.used_percent || 0, 100);
      var pc = color(used5h);
      var wc = color(usedWeek);
      var pill = document.getElementById('plan-status-pill');
      pill.textContent = (plan.plan_type || 'unknown').toUpperCase() + (plan.limit_reached ? ' LIMIT' : '');
      pill.className = 'provider-pill ' + (plan.limit_reached ? 'hit' : (plan.allowed ? 'ok' : 'warn'));
      document.getElementById('plan-primary-used').textContent = used5h.toFixed(0)+'%';
      document.getElementById('plan-primary-used').style.color = pc;
      document.getElementById('plan-secondary-used').textContent = usedWeek.toFixed(0)+'%';
      document.getElementById('plan-secondary-used').style.color = wc;
      document.getElementById('plan-primary-reset').textContent = 'reset ' + formatCountdown(p5.reset_after_seconds || 0);
      document.getElementById('plan-secondary-reset').textContent = 'reset ' + formatCountdown(pw.reset_after_seconds || 0);
      document.getElementById('plan-primary-window').textContent = '5h window ' + formatWindowLabel(p5.limit_window_seconds || 0);
      document.getElementById('plan-secondary-window').textContent = '1w window ' + formatWindowLabel(pw.limit_window_seconds || 0);
      var p5b=document.getElementById('plan-primary-bar');
      document.getElementById('plan-primary-bar').style.width=used5h+'%';
      document.getElementById('plan-primary-bar').style.background='linear-gradient(90deg,var(--cyan),'+pc+')';
      var pwb=document.getElementById('plan-secondary-bar');
      pwb.style.width=usedWeek+'%';
      pwb.style.background='linear-gradient(90deg,var(--accent),'+wc+')';
    } else {
      var pill = document.getElementById('plan-status-pill');
      pill.textContent = 'N/A'; pill.className = 'provider-pill';
      document.getElementById('plan-primary-used').textContent = '--%';
      document.getElementById('plan-secondary-used').textContent = '--%';
      document.getElementById('plan-primary-reset').textContent = '--';
      document.getElementById('plan-secondary-reset').textContent = '--';
      document.getElementById('plan-primary-window').textContent = '5h window --';
      document.getElementById('plan-secondary-window').textContent = '1w window --';
      document.getElementById('plan-primary-bar').style.width = '0%';
      document.getElementById('plan-secondary-bar').style.width = '0%';
    }

    // ── Claude Usage ─────────────────────────────────
    var claude = d.claude_usage;
    if(claude){
      var c5 = claude.five_hour_window || {};
      var c1w = claude.one_week_window || {};
      var isApiSource = claude.usage_source === 'api';
      var fiveHourPct = isApiSource ? Number(c5.used_percent || 0) : null;
      var weekPct = isApiSource ? Number(c1w.used_percent || 0) : null;
      var fiveHourBar = fiveHourPct !== null ? Math.max(0, Math.min(100, fiveHourPct)) : 0;
      var weekBar = weekPct !== null ? Math.max(0, Math.min(100, weekPct)) : 0;
      var topModel = claude.models && claude.models.length ? claude.models[0].model : 'No recent models';
      var cpill = document.getElementById('claude-status-pill');
      cpill.textContent = isApiSource ? (claude.subscription_type || 'plan').toUpperCase() : 'LOCAL';
      cpill.className = 'provider-pill ' + (isApiSource ? 'ok' : 'warn');
      var c5tok = c5.total_tokens || 0;
      var c1wtok = c1w.total_tokens || 0;
      document.getElementById('claude-primary-used').textContent = fiveHourPct !== null ? fiveHourBar.toFixed(0)+'%' : (c5tok > 0 ? formatTokenCount(c5tok) : '--');
      document.getElementById('claude-secondary-used').textContent = weekPct !== null ? weekBar.toFixed(0)+'%' : (c1wtok > 0 ? formatTokenCount(c1wtok) : '--');
      document.getElementById('claude-primary-reset').textContent = 'reset ' + formatCountdown(c5.reset_after_seconds || 0);
      document.getElementById('claude-secondary-reset').textContent = 'reset ' + formatCountdown(c1w.reset_after_seconds || 0);
      document.getElementById('claude-primary-bar').style.width = fiveHourBar + '%';
      document.getElementById('claude-secondary-bar').style.width = weekBar + '%';
      document.getElementById('claude-cost').textContent = 'Session ' + formatMoney(claude.recent_session_cost_usd || 0) + ' • ' + topModel;
      document.getElementById('claude-project').textContent = formatTokenCount(claude.recent_session_total_tokens || 0) + ' tok • ' + shortPath(claude.project_path || '');
    } else {
      var cpill = document.getElementById('claude-status-pill');
      cpill.textContent = 'N/A'; cpill.className = 'provider-pill';
      document.getElementById('claude-primary-used').textContent = '--';
      document.getElementById('claude-secondary-used').textContent = '--';
      document.getElementById('claude-primary-reset').textContent = '--';
      document.getElementById('claude-secondary-reset').textContent = '--';
      document.getElementById('claude-primary-bar').style.width = '0%';
      document.getElementById('claude-secondary-bar').style.width = '0%';
      document.getElementById('claude-cost').textContent = 'Session --';
      document.getElementById('claude-project').textContent = 'Project --';
    }

    // ── Cron jobs ────────────────────────────────────
    var cdiv=document.getElementById('cron-jobs'); cdiv.innerHTML='';
    if(d.crons && d.crons.length){
      d.crons.forEach(function(c){
        var state=(c.state||'active')==='paused'?'paused':'active';
        var owner=esc(c.owner||c.profile||'');
        var ownerBadge=owner?'<span class="cron-owner">'+owner+'</span>':'';
        var statusDot=c.last_status==='ok'
          ?'<span style="color:var(--green);font-size:11px;">✓</span>'
          :c.last_status
            ?'<span style="color:var(--red);font-size:11px;">✗</span>'
            :'';
        cdiv.innerHTML+='<div class="cron-item">'
          +'<div class="cron-strip '+state+'"></div>'
          +'<div class="cron-body">'
          +'<div class="cron-name">'+statusDot+ownerBadge+esc(c.name||'Unnamed')
          +' <span class="cron-badge '+state+'">'+state+'</span></div>'
          +'<div class="cron-meta">'+esc(c.next_run||'N/A')+'</div>'
          +'</div></div>';
      });
    } else {
      cdiv.innerHTML='<div style="color:var(--dim);font-size:10px;padding-top:8px;">No jobs scheduled</div>';
    }

    // ── Agent Ops / Attention ───────────────────────
    renderAgentOps(d);
    renderWarnings(d, null);

    // ── Model + status ───────────────────────────────
    var modelInfo = d.model_info || {model:d.hermes_model||'', provider:''};
    var modelLabel = formatModelLabel(modelInfo);
    if(modelLabel){
      var modelTag = document.getElementById('model-tag');
      modelTag.textContent = '🤖 '+modelLabel;
      modelTag.title = modelInfo.provider ? (modelInfo.provider+' / '+modelInfo.model) : modelInfo.model;
    }
    document.getElementById('live-dot').className='dot on pulse';
    document.getElementById('status-text').textContent='LIVE';


  } catch(e){
    console.error('Fetch error:', e);
    document.getElementById('live-dot').className='dot off';
    document.getElementById('status-text').textContent='OFFLINE';
    renderWarnings(lastStatusData, e && e.message ? e.message : String(e));
  }
}

function exitDashboard(){
  fetch('/api/exit',{keepalive:true});
  setTimeout(function(){window.close()},500);
}

setInterval(updateClock,1000); updateClock();
fetchMetrics();
setInterval(fetchMetrics,2000);
</script>
</body>
</html>
